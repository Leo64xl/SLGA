spring.application.name=demo
# Configuración de la base de datos
# 'db' será el nombre del contenedor de MySQL en nuestro docker-compose

# Para desarrollo local
# spring.datasource.url=jdbc:mysql://localhost:3306/slga_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=
# server.port=8081

# DOCKER CONFIG
 spring.datasource.url=jdbc:mysql://db:3306/slga_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
 spring.datasource.username=root
 spring.datasource.password=root_password

# Hibernate (Para que cree las tablas automáticamente si no existen)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect